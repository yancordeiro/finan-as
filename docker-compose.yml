version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: financas-db
    environment:
      POSTGRES_USER: financas
      POSTGRES_PASSWORD: financas_dev_password
      POSTGRES_DB: financas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - financas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financas -d financas_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: financas-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-init.sh:/ollama-init.sh
    networks:
      - financas-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    # Descomente as linhas abaixo se você tiver GPU NVIDIA:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financas-backend
    environment:
      DATABASE_URL: postgres://financas:financas_dev_password@postgres:5432/financas_db?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000/auth/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: "8080"
      # Configuração Ollama
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - financas-network
    # Se seu backend NÃO precisa hot-reload por volume, recomendo remover.
    # Se precisa, mantenha.
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Se seu Dockerfile do frontend usa ARGs para VITE_API_URL, habilite aqui:
      # args:
      #   VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
      #   VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: financas-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - financas-network
    restart: unless-stopped

networks:
  financas-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
